			shellPath = /bin/bash;
			shellScript = "# 1. 路径定义\n# 建议：确保 TARGET_DIR 不在 Xcode 默认自动搜索的根目录下，避免索引冲突\nSOURCE_DIR=\"$PROJECT_DIR/../../client\"\nTARGET_DIR=\"$PROJECT_DIR/app_code\"\nHOST_PYTHON=\"/Users/yiliu/Documents/GitHub/Mario/ios/dist/hostpython3/bin/python\"\n\necho \"📡 Step 1: 同步中 (排除所有缓存和 Git 文件)...\"\nmkdir -p \"$TARGET_DIR\"\n\n# 使用 rsync 同步，并严格排除干扰文件\nrsync -av --delete \\\n    --exclude=\"venv\" \\\n    --exclude=\"__pycache__\" \\\n    --exclude=\".git\" \\\n    --exclude=\".DS_Store\" \\\n    --exclude=\"*.pyc\" \\\n    \"$SOURCE_DIR/\" \"$TARGET_DIR/\"\n\n# 2. 编译逻辑\nif [ -f \"$HOST_PYTHON\" ]; then\n    echo \"📦 Step 2: 正在将 Python 源码编译为字节码 (.py -> .pyc)...\"\n    \n    # -f: 强制重新编译\n    # -b: 将编译后的文件直接放在源代码旁边 (方便我们后续删除 .py)\n    \"$HOST_PYTHON\" -m compileall -f -b \"$TARGET_DIR\"\n    \n    echo \"🧹 Step 3: 物理删除 .py 源码文件，防止 Xcode 重复索引...\"\n    # 核心修复：只保留编译后的二进制，防止 Xcode 报错 Multiple commands produce\n    find \"$TARGET_DIR\" -type f -name \"*.py\" -delete\n    \n    # 额外清理：防止遗留 __pycache__ 文件夹干扰\n    find \"$TARGET_DIR\" -type d -name \"__pycache__\" -exec rm -rf {} +\n    \n    echo \"✅ 字节码转换完成，源码已清理。\"\nelse\n    echo \"⚠️ 错误: 未检测到 hostpython ($HOST_PYTHON)，跳过编译阶段。\"\nfi\n\n# 3. 强制刷新\n# 更新时间戳，确保 Xcode 意识到文件夹内容已变动\ntouch \"$TARGET_DIR\"\n\necho \"🚀 当前项目路径: $PROJECT_DIR\"\n";
